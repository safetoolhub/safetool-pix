name: Bug Report
description: Report a problem with SafeTool Pix
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I click X, the app crashes / shows incorrect results...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open the app
        2. Select a folder with...
        3. Click "Analyze"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch/other)
        - Windows 10
        - Windows 11
        - macOS 12
        - macOS 13+
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SafeTool Pix Version
      placeholder: "e.g. 0.9-beta"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Paste any relevant log content from `~/Documents/SafeTool_Pix/logs/`. 
        You can collapse this with `<details>` tags.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, file types involved, folder size, anything else useful.
