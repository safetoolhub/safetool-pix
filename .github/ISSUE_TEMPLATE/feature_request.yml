name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or limitation you're experiencing.
      placeholder: I often have to manually... / It's hard to... / There's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Cleanup & Space tools
        - Visual Detection tools
        - Organization tools
        - Scanner / Analysis performance
        - UI / UX improvement
        - Platform support
        - Internationalization / Language
        - Settings / Configuration
        - Other
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Compliance
      description: SafeTool Pix is 100% offline. Please confirm your feature respects this.
      options:
        - label: This feature does not require any network connection or external service
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, screenshots, links to similar tools, or any other context.
