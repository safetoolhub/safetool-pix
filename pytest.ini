[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output y reporting
addopts =
    --verbose
    --tb=short
    --color=yes
    -ra
    
# Coverage configuration
# --cov=services
# --cov=utils
# --cov-report=term-missing
# --cov-report=html:htmlcov
# --cov-fail-under=70

# Markers personalizados
markers =
    unit: Tests unitarios de lógica de negocio (services, utils)
    integration: Tests de integración entre componentes
    ui: Tests de componentes UI (requiere PyQt6)
    slow: Tests que tardan más de 1 segundo
    live_photos: Tests específicos de funcionalidad Live Photos
    duplicates: Tests de detección de duplicados
    similar: Tests de detección de archivos similares
    renaming: Tests de renombrado de archivos
    organization: Tests de organización de archivos
    heic: Tests de funcionalidad HEIC
    heic: Tests del servicio de eliminación de archivos HEIC duplicados

# Opciones de ejecución
console_output_style = progress
log_cli = false
log_cli_level = INFO
